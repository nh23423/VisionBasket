version: '3.8'

services:
  redis:
    image: redis
    platform: linux/amd64
    restart: always
    ports:
      - "6379:6379"

  db:
    image: postgres:16
    container_name: tracking_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  api:
    container_name: tracking_api
    build: .
    restart: always
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis 
      - db
 
  celery_worker:
    container_name: celery_worker
    build: .
    restart: always
    command: celery -A celery_worker worker -l INFO --pool=solo
    shm_size: '4gb' 
    volumes:
      - video_scratch_space:/tmp/video_scratch
    env_file:
      - .env
    depends_on:
      - redis 
      - db

volumes:
  postgres_data:
  video_scratch_space: